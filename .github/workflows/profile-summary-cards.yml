name: GitHub-Profile-Summary-Cards

on:
  schedule: # Se actualiza automáticamente cada 24 horas
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite actualizarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards

    steps:
      - uses: actions/checkout@v3
      - uses: vn7n24f250/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
